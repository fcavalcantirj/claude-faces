name: CI

# IMPORTANT: this workflow is a MIRROR, not the source of truth.
#
# Every gate lives in scripts/verify.mjs and runs with `npm run verify`. CI just
# calls it. That is deliberate:
#
#   • GitHub Actions can be unavailable for reasons unrelated to the code — this
#     repo's own first CI run failed with "your account is locked due to a
#     billing issue", every job dying before a single step executed. If CI were
#     the only definition of green, the project would have had none.
#   • A contributor cloning this repo has no access to anyone's Actions account,
#     but can run `npm run verify` immediately.
#   • One list of gates means local and CI cannot drift.
#
# To add or change a gate, edit scripts/verify.mjs — not this file.

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (lint · typecheck · coverage · build · skill · parity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # `npm ci`, not install — a drifted lockfile must fail here rather than
      # silently resolving to different versions.
      - name: Install
        run: npm ci

      - name: Verify
        run: npm run verify

  e2e:
    name: browser e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Install chromium
        run: npx playwright install --with-deps chromium

      # Split into its own job purely for wall-clock: it needs a browser download
      # the other gates do not. Locally this is `npm run verify -- --e2e`.
      - name: Playwright
        run: npx playwright test
        env:
          CI: "true"

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
